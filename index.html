<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GIS RAG System - Kelola Pulau & Titik Kedalaman Laut</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- Font Awesome 6 (Free) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', 'Inter', Roboto, system-ui, -apple-system, sans-serif;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
            background: #eef5ff;
        }
        
        #map {
            height: 100vh;
            width: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        
        /* Sidebar */
        .sidebar {
            position: absolute;
            top: 18px;
            right: 18px;
            width: 460px;
            max-width: calc(100% - 36px);
            max-height: 92vh;
            background: #ffffff;
            border-radius: 32px;
            box-shadow: 0 18px 36px rgba(0, 32, 64, 0.12), 0 4px 12px rgba(0, 0, 0, 0.04);
            z-index: 1000;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            font-size: 13px;
            border: 1px solid rgba(59, 130, 246, 0.25);
            transition: all 0.25s ease;
        }
        
        .sidebar::-webkit-scrollbar { width: 6px; }
        .sidebar::-webkit-scrollbar-track { background: #eef2ff; border-radius: 10px; }
        .sidebar::-webkit-scrollbar-thumb { background: #7aa9ff; border-radius: 10px; }
        
        .sidebar-header {
            padding: 18px 24px;
            background: #f0f7ff;
            color: #0a3b5c;
            border-radius: 32px 32px 0 0;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #cde3fe;
            font-weight: 600;
        }
        
        .sidebar-header h3 { 
            font-size: 1.05rem; 
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .sidebar-header h3 i { color: #2c7be5; font-size: 1.2rem; }
        .sidebar-header .toggle-icon { font-size: 1.2rem; color: #5282c1; transition: transform 0.2s; }
        .sidebar.collapsed .sidebar-header .toggle-icon { transform: rotate(180deg); }
        .sidebar-content { padding: 22px 24px; display: block; }
        .sidebar.collapsed .sidebar-content { display: none; }
        
        /* Tabs */
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 26px;
            background: #eef3fc;
            padding: 6px;
            border-radius: 60px;
        }
        
        .tab-btn {
            flex: 1;
            padding: 10px 6px;
            border: none;
            background: transparent;
            cursor: pointer;
            font-weight: 600;
            border-radius: 40px;
            font-size: 0.8rem;
            transition: all 0.2s;
            color: #2c5a8c;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .tab-btn i { font-size: 0.9rem; }
        .tab-btn.active { 
            background: #3b82f6; 
            color: white;
            box-shadow: 0 4px 10px rgba(59,130,246,0.3);
        }
        .tab-pane { display: none; animation: fadeSlide 0.2s ease; }
        .tab-pane.active { display: block; }
        @keyframes fadeSlide { from { opacity:0; transform: translateY(4px); } to { opacity:1; transform: translateY(0); } }
        
        /* Mode selector */
        .mode-selector {
            display: flex;
            gap: 14px;
            margin-bottom: 22px;
        }
        
        .mode-btn {
            flex: 1;
            padding: 10px 8px;
            border: none;
            background: #f4f9ff;
            border-radius: 48px;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.8rem;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: #1f509e;
            box-shadow: 0 1px 2px rgba(0,0,0,0.02), inset 0 0 0 1px rgba(59,130,246,0.2);
        }
        
        .mode-btn.active { 
            background: #3b82f6; 
            color: white; 
            box-shadow: 0 6px 12px rgba(59,130,246,0.25);
        }
        
        .action-buttons {
            display: flex;
            gap: 14px;
            margin-bottom: 18px;
            flex-wrap: wrap;
        }
        
        .action-buttons button {
            flex: 1;
            padding: 11px 8px;
            border: none;
            border-radius: 48px;
            font-weight: 700;
            font-size: 0.78rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s ease;
        }
        
        .btn-primary { background: #3b82f6; color: white; }
        .btn-primary:hover { background: #2563eb; transform: translateY(-1px); }
        .btn-success { background: #10b981; color: white; }
        .btn-success:hover { background: #059669; }
        .btn-danger { background: #ef4444; color: white; }
        .btn-danger:hover { background: #dc2626; }
        .btn-warning { background: #f59e0b; color: white; }
        .btn-export { background: #475569; color: white; }
        .btn-depth { background: #1e6f5c; color: white; }
        
        .island-list, .depth-list {
            max-height: 200px;
            overflow-y: auto;
            margin-bottom: 18px;
            border: 1px solid #d9e9ff;
            border-radius: 28px;
            background: #fdfdfd;
            padding: 6px;
        }
        
        .island-item, .depth-item {
            background: white;
            border-radius: 24px;
            padding: 12px 16px;
            margin-bottom: 10px;
            border-left: 5px solid #3b82f6;
            box-shadow: 0 2px 5px rgba(0,0,0,0.03);
            transition: all 0.15s;
        }
        
        .depth-item {
            border-left: 5px solid #1e6f5c;
            cursor: pointer;
        }
        .depth-item:hover { background: #e6faf5; transform: translateX(-3px); }
        
        .island-name, .depth-name { font-weight: 700; display: flex; justify-content: space-between; align-items: center; color: #0f3b6a; }
        .depth-name { color: #1e5a4c; }
        .island-coords, .depth-info { font-size: 10px; color: #4b6f9e; margin-top: 8px; display: flex; gap: 8px; align-items: center; }
        
        .label-input {
            display: flex;
            gap: 12px;
            margin-top: 14px;
            margin-bottom: 16px;
        }
        
        .label-input input {
            flex: 1;
            padding: 12px 18px;
            border: 1px solid #cde0ff;
            border-radius: 48px;
            font-size: 0.8rem;
            background: white;
        }
        
        .json-editor {
            width: 100%;
            height: 210px;
            font-family: monospace;
            font-size: 11px;
            padding: 16px;
            border: 1px solid #cde0ff;
            border-radius: 28px;
            background: #fefef7;
            margin-bottom: 18px;
        }
        
        .mouse-coords {
            position: absolute;
            bottom: 20px;
            right: 22px;
            z-index: 1000;
            background: rgba(59, 130, 246, 0.88);
            backdrop-filter: blur(10px);
            color: white;
            padding: 6px 20px;
            border-radius: 60px;
            font-family: monospace;
            font-size: 11px;
            pointer-events: none;
        }
        
        .info-panel {
            position: absolute;
            bottom: 22px;
            left: 22px;
            z-index: 1000;
            background: rgba(15, 52, 96, 0.88);
            backdrop-filter: blur(10px);
            color: white;
            padding: 8px 24px;
            border-radius: 60px;
            font-size: 12px;
            pointer-events: none;
            max-width: 380px;
            border-left: 3px solid #6ea8fe;
        }
        
        .file-import-area {
            border: 2px dashed #8bb9fe;
            border-radius: 28px;
            padding: 18px;
            text-align: center;
            margin-bottom: 22px;
            background: #f5fbff;
            cursor: pointer;
            transition: 0.2s;
        }
        .file-import-area:hover { background: #eef4ff; border-color: #3b82f6; }
        .import-label { font-weight: 700; color: #2c7be5; display: flex; align-items: center; justify-content: center; gap: 12px; }
        input[type="file"] { display: none; }
        
        .reorder-buttons { display: flex; gap: 10px; margin-left: 10px; }
        .reorder-btn {
            background: #eef2ff;
            border: none;
            border-radius: 36px;
            padding: 4px 14px;
            font-size: 11px;
            cursor: pointer;
            font-weight: 700;
            color: #2c5f9a;
        }
        
        .point-chip {
            background: #3b82f6;
            padding: 5px 14px;
            border-radius: 40px;
            font-size: 10px;
            color: white;
            display: inline-block;
            margin: 5px;
            font-weight: 600;
        }
        
        @media (max-width: 700px) {
            .sidebar { width: calc(100% - 24px); right: 12px; left: 12px; top: 12px; max-height: 80vh; }
            .info-panel { bottom: 80px; left: 12px; font-size: 10px; max-width: 220px; }
        }
    </style>
</head>
<body>
    <div id="map"></div>
    
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header" id="sidebarHeader">
            <h3><i class="fas fa-map-marked-alt"></i> GIS RAG · Pulau & Kedalaman</h3>
            <span class="toggle-icon"><i class="fas fa-chevron-down"></i></span>
        </div>
        <div class="sidebar-content">
            <div class="tabs">
                <button class="tab-btn active" data-tab="draw"><i class="fas fa-draw-polygon"></i> Gambar Pulau</button>
                <button class="tab-btn" data-tab="depth"><i class="fas fa-water"></i> Kedalaman Laut</button>
                <button class="tab-btn" data-tab="rag"><i class="fas fa-robot"></i> RAG Cari</button>
                <button class="tab-btn" data-tab="json"><i class="fas fa-code"></i> JSON Data</button>
            </div>
            
            <!-- Tab Gambar Pulau -->
            <div class="tab-pane active" id="tab-draw">
                <div class="mode-selector">
                    <button id="lineModeBtn" class="mode-btn"><i class="fas fa-chart-line"></i> Garis Lurus</button>
                    <button id="curveModeBtn" class="mode-btn active"><i class="fas fa-bezier-curve"></i> Bezier</button>
                </div>
                <div class="action-buttons">
                    <button id="drawBtn" class="btn-primary"><i class="fas fa-pencil-alt"></i> Mulai Gambar</button>
                    <button id="undoPointBtn" class="btn-warning" style="display:none;"><i class="fas fa-undo-alt"></i> Undo</button>
                </div>
                <div class="action-buttons">
                    <button id="clearAllBtn" class="btn-danger"><i class="fas fa-trash-alt"></i> Hapus Semua</button>
                </div>
                <select id="drawColor" style="width:100%; padding:12px; border-radius:48px; margin-bottom:20px;">
                    <option value="#3b82f6">🔵 Biru</option>
                    <option value="#FF6B6B">🔴 Merah</option>
                    <option value="#10b981">💚 Hijau</option>
                </select>
                <div id="currentPointsPanel" style="display:none; margin-top:18px; background:#f0f9ff; padding:16px; border-radius:28px;">
                    <strong><i class="fas fa-map-pin"></i> Titik saat ini:</strong>
                    <div id="currentPointsList" style="display:flex; flex-wrap:wrap; gap:10px; margin-top:12px;"></div>
                    <button id="clearCurrentPointsBtn" class="btn-warning" style="width:100%; margin-top:16px;"><i class="fas fa-eraser"></i> Hapus Titik</button>
                </div>
                <div class="label-input">
                    <input type="text" id="newIslandName" placeholder="Nama pulau baru...">
                    <button id="addCurrentAsIsland" class="btn-primary"><i class="fas fa-save"></i> Simpan Pulau</button>
                </div>
                <div style="font-size: 12px; font-weight: 600; margin: 16px 0 8px;">🏝️ Daftar Pulau (drag urutkan)</div>
                <div class="island-list" id="islandList"></div>
                <div class="action-buttons">
                    <button id="clearIslandsBtn" class="btn-danger"><i class="fas fa-trash"></i> Hapus Semua Pulau</button>
                </div>
            </div>
            
            <!-- Tab Kedalaman Laut - SEDERHANA: nama + kedalaman, klik peta sekali -->
            <div class="tab-pane" id="tab-depth">
                <div class="info-panel" style="position: relative; bottom:0; left:0; background:#e2f0f5; color:#0b4f3e; margin-bottom:20px; text-align:center; backdrop-filter:none;">
                    💡 Isi nama & kedalaman, lalu <strong>klik pada peta</strong> untuk menandai titik
                </div>
                <div class="label-input">
                    <input type="text" id="depthNameInput" placeholder="Nama titik (contoh: Palung Jawa)" value="Palung Laut Dalam">
                    <input type="number" id="depthMetersInput" placeholder="Kedalaman (meter)" value="2500" step="100">
                </div>
                <div class="action-buttons">
                    <button id="activateDepthPickBtn" class="btn-depth"><i class="fas fa-water"></i> Aktifkan Pilih Lokasi</button>
                    <button id="clearDepthBtn" class="btn-danger"><i class="fas fa-trash-alt"></i> Hapus Semua</button>
                </div>
                <div style="margin-top: 16px; font-weight: 600;"><i class="fas fa-dot-circle"></i> Titik Kedalaman Laut</div>
                <div class="depth-list" id="depthList"></div>
                <div id="depthModeStatus" style="margin-top:12px; font-size:11px; text-align:center; color:#1e6f5c; background:#eef; padding:8px; border-radius:40px;">
                    ⚓ Mode tidak aktif. Klik tombol di atas.
                </div>
            </div>
            
            <!-- Tab RAG Pencarian -->
            <div class="tab-pane" id="tab-rag">
                <input type="text" id="ragQuery" class="query-input" placeholder="Cari nama pulau atau kedalaman...">
                <button id="searchRAGBtn" class="btn-primary" style="width:100%; margin-bottom:16px;"><i class="fas fa-search"></i> Cari</button>
                <div class="query-result" id="ragResult"><i class="fas fa-lightbulb"></i> Contoh: "Palung" atau "Jawa"</div>
            </div>
            
            <!-- Tab JSON -->
            <div class="tab-pane" id="tab-json">
                <textarea id="jsonEditor" class="json-editor" placeholder='{"islands":[],"depthPoints":[]}'></textarea>
                <div class="action-buttons">
                    <button id="applyJsonBtn" class="btn-success"><i class="fas fa-check"></i> Terapkan</button>
                    <button id="exportJsonBtn" class="btn-export"><i class="fas fa-download"></i> Export JSON</button>
                </div>
                <div class="file-import-area" id="fileImportArea">
                    <label for="jsonFileInput" class="import-label"><i class="fas fa-cloud-upload-alt"></i> 📂 Impor File JSON</label>
                    <input type="file" id="jsonFileInput" accept=".json" />
                </div>
            </div>
        </div>
    </div>
    
    <div class="info-panel" id="infoPanel"><i class="fas fa-info-circle"></i> Kelola pulau & titik kedalaman laut</div>
    <div class="mouse-coords" id="mouseCoords"><i class="fas fa-mouse-pointer"></i> --, --</div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // ---------- INIT MAP ----------
        const map = L.map('map').setView([-2.5, 118], 5);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> & CartoDB'
        }).addTo(map);
        
        // ---------- DATA STRUCTURE ----------
        let appData = {
            islands: [],     // { name, polygon: [[lat,lng],...] }
            depthPoints: []  // { name, depth, lat, lng }
        };
        
        // Layers
        let islandLayers = [], depthMarkers = [];
        // Drawing state
        let controlPoints = [], tempMarkers = [], currentPreviewLine = null, isDrawingMode = false, currentMode = 'curve', allDrawingObjects = [];
        
        // Depth pick mode state
        let isDepthPickMode = false;
        
        // DOM elements
        const drawBtn = document.getElementById('drawBtn'), lineModeBtn = document.getElementById('lineModeBtn'), curveModeBtn = document.getElementById('curveModeBtn');
        const undoPointBtn = document.getElementById('undoPointBtn'), clearAllBtn = document.getElementById('clearAllBtn');
        const clearCurrentPointsBtn = document.getElementById('clearCurrentPointsBtn'), drawColor = document.getElementById('drawColor');
        const currentPointsPanel = document.getElementById('currentPointsPanel'), currentPointsList = document.getElementById('currentPointsList');
        const addCurrentAsIsland = document.getElementById('addCurrentAsIsland'), clearIslandsBtn = document.getElementById('clearIslandsBtn');
        const islandListDiv = document.getElementById('islandList');
        const ragQuery = document.getElementById('ragQuery'), searchRAGBtn = document.getElementById('searchRAGBtn'), ragResult = document.getElementById('ragResult');
        const jsonEditor = document.getElementById('jsonEditor'), applyJsonBtn = document.getElementById('applyJsonBtn'), exportJsonBtn = document.getElementById('exportJsonBtn');
        const infoPanel = document.getElementById('infoPanel'), jsonFileInput = document.getElementById('jsonFileInput'), fileImportArea = document.getElementById('fileImportArea');
        const sidebar = document.getElementById('sidebar'), sidebarHeader = document.getElementById('sidebarHeader');
        // Depth elements
        const depthNameInput = document.getElementById('depthNameInput'), depthMetersInput = document.getElementById('depthMetersInput');
        const activateDepthPickBtn = document.getElementById('activateDepthPickBtn'), clearDepthBtn = document.getElementById('clearDepthBtn');
        const depthListDiv = document.getElementById('depthList'), depthModeStatus = document.getElementById('depthModeStatus');
        
        // ========== FUNGSI GAMBAR PULAU (Bezier/Line) ==========
        function getBezierPoints(points, t) {
            if (points.length===3) { const [p0,p1,p2]=points; return [(1-t)**2*p0[0]+2*(1-t)*t*p1[0]+t**2*p2[0], (1-t)**2*p0[1]+2*(1-t)*t*p1[1]+t**2*p2[1]]; }
            else if(points.length===4){ const [p0,p1,p2,p3]=points; return [(1-t)**3*p0[0]+3*(1-t)**2*t*p1[0]+3*(1-t)*t**2*p2[0]+t**3*p3[0], (1-t)**3*p0[1]+3*(1-t)**2*t*p1[1]+3*(1-t)*t**2*p2[1]+t**3*p3[1]]; }
            return null;
        }
        function generateCurvePoints(ptsArr) {
            if (ptsArr.length<2) return ptsArr.map(p=>[p.lat,p.lng]);
            const points = ptsArr.map(p=>[p.lat,p.lng]);
            if(points.length===3||points.length===4){ let res=[]; for(let i=0;i<=50;i++){ const bp=getBezierPoints(points,i/50); if(bp) res.push(bp); } return res; }
            return points;
        }
        function createCurve(points,color) { if(points.length<2) return null; return L.polyline(generateCurvePoints(points), { color, weight: 4, opacity:0.85, smoothFactor:1 }); }
        function createLine(points,color) { return L.polyline(points.map(p=>[p.lat,p.lng]), { color, weight: 4 }); }
        
        function renderIslands() {
            islandLayers.forEach(l=>map.removeLayer(l));
            islandLayers=[];
            appData.islands.forEach(island=>{
                if(island.polygon?.length>=3){
                    const poly = L.polygon(island.polygon, { color: '#3b82f6', weight: 2.5, fillColor: '#8bb9fe', fillOpacity: 0.25 });
                    poly.addTo(map).bindPopup(`<b>🏝️ ${island.name}</b><br>${island.polygon.length} titik`);
                    islandLayers.push(poly);
                } else if(island.polygon?.length>=2){
                    const line = L.polyline(island.polygon, { color: '#3b82f6', weight: 3 });
                    line.addTo(map).bindPopup(`<b>${island.name}</b>`);
                    islandLayers.push(line);
                }
            });
            updateIslandListUI();
            updateJsonEditorOnly();
        }
        
        function updateIslandListUI() {
            if(!appData.islands.length){ islandListDiv.innerHTML='<div style="padding:28px;text-align:center;">🏝️ Belum ada pulau. Buat gambar.</div>'; return; }
            let html=''; appData.islands.forEach((isl,idx)=>{ html+=`<div class="island-item" draggable="true" data-index="${idx}"><div class="island-name"><span><span class="drag-handle"><i class="fas fa-grip-vertical"></i></span> 🏝️ ${isl.name}</span><div class="reorder-buttons"><button class="reorder-btn up-btn" data-idx="${idx}"><i class="fas fa-arrow-up"></i></button><button class="reorder-btn down-btn" data-idx="${idx}"><i class="fas fa-arrow-down"></i></button><button onclick="window.deleteIsland(${idx})" style="background:#ef4444; color:white; border:none; border-radius:40px; padding:4px 14px;">Hapus</button></div></div><div class="island-coords">📍 ${isl.polygon.length} koordinat</div></div>`; });
            islandListDiv.innerHTML=html; attachDragEvents();
        }
        
        function attachDragEvents(){
            document.querySelectorAll('.island-item').forEach(item=>{
                item.setAttribute('draggable', 'true');
                item.addEventListener('dragstart', e=>{ e.dataTransfer.setData('text/plain', item.dataset.index); item.classList.add('dragging'); });
                item.addEventListener('dragend', e=>{ item.classList.remove('dragging'); });
                item.addEventListener('dragover', e=>e.preventDefault());
                item.addEventListener('drop', e=>{ e.preventDefault(); const fromIdx=parseInt(e.dataTransfer.getData('text/plain')); const toIdx=parseInt(item.dataset.index); if(!isNaN(fromIdx) && !isNaN(toIdx) && fromIdx!==toIdx){ const arr=appData.islands; const [moved]=arr.splice(fromIdx,1); arr.splice(toIdx,0,moved); renderIslands(); infoPanel.innerHTML='🔄 Urutan pulau diubah'; } });
            });
            document.querySelectorAll('.up-btn').forEach(btn=>btn.addEventListener('click',e=>{ e.stopPropagation(); let idx=parseInt(btn.dataset.idx); if(idx>0) moveIsland(idx,idx-1); }));
            document.querySelectorAll('.down-btn').forEach(btn=>btn.addEventListener('click',e=>{ e.stopPropagation(); let idx=parseInt(btn.dataset.idx); if(idx<appData.islands.length-1) moveIsland(idx,idx+1); }));
        }
        function moveIsland(from,to){ const arr=appData.islands; const [rem]=arr.splice(from,1); arr.splice(to,0,rem); renderIslands(); }
        window.deleteIsland=(idx)=>{ appData.islands.splice(idx,1); renderIslands(); infoPanel.innerHTML='🗑️ Pulau dihapus'; };
        
        function renderDepthPoints() {
            depthMarkers.forEach(m=>map.removeLayer(m));
            depthMarkers=[];
            appData.depthPoints.forEach(dp=>{
                const depthIcon = L.divIcon({ html: `<div style="background:#1e6f5c; width:18px; height:18px; border-radius:50%; border:2px solid #c0f5e8; box-shadow:0 0 8px #29a88b; display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:bold; color:white;">🌊</div>`, iconSize: [18,18] });
                const marker = L.marker([dp.lat, dp.lng], { icon: depthIcon }).addTo(map).bindPopup(`<b>🌊 ${dp.name}</b><br>Kedalaman: ${dp.depth} m<br>${dp.lat.toFixed(4)}, ${dp.lng.toFixed(4)}`);
                depthMarkers.push(marker);
            });
            updateDepthListUI();
            updateJsonEditorOnly();
        }
        
        function updateDepthListUI() {
            if(!appData.depthPoints.length){ depthListDiv.innerHTML='<div style="padding:20px;text-align:center;">🌊 Belum ada titik kedalaman. Aktifkan mode lalu klik peta.</div>'; return; }
            let html=''; appData.depthPoints.forEach((dp,idx)=>{ html+=`<div class="depth-item" onclick="window.focusDepth(${idx})"><div class="depth-name"><span><i class="fas fa-water"></i> ${dp.name}</span><button onclick="event.stopPropagation(); window.deleteDepth(${idx})" style="background:#dc2626; border:none; color:white; border-radius:30px; padding:4px 12px;"><i class="fas fa-trash"></i></button></div><div class="depth-info">📍 ${dp.lat.toFixed(4)}, ${dp.lng.toFixed(4)} | 📏 ${dp.depth} m</div></div>`; });
            depthListDiv.innerHTML=html;

        window.focusDepth=(idx)=>{ const dp=appData.depthPoints[idx]; map.setView([dp.lat, dp.lng], 9); infoPanel.innerHTML=`🌊 Fokus: ${dp.name} (${dp.depth}m)`; };
        window.deleteDepth=(idx)=>{ appData.depthPoints.splice(idx,1); renderDepthPoints(); renderIslands(); infoPanel.innerHTML='🗑️ Titik kedalaman dihapus'; };
        
        function addDepthPointFromClick(lat, lng) {
            let name = depthNameInput.value.trim();
            if(!name) name = `Kedalaman ${appData.depthPoints.length+1}`;
            let depth = parseFloat(depthMetersInput.value);
            if(isNaN(depth)) depth = 100;
            appData.depthPoints.push({ name: name, depth: depth, lat: lat, lng: lng });
            renderDepthPoints();
            renderIslands(); 
            infoPanel.innerHTML=`✅ Titik kedalaman "${name}" (${depth}m) ditandai di koordinat ${lat.toFixed(4)}, ${lng.toFixed(4)}`;
            // Matikan mode pick otomatis setelah berhasil tambah
            if(isDepthPickMode) deactivateDepthPickMode();
        }
        
        function deactivateDepthPickMode() {
            isDepthPickMode = false;
            map.off('click', depthClickHandler);
            activateDepthPickBtn.innerHTML = '<i class="fas fa-water"></i> Aktifkan Pilih Lokasi';
            activateDepthPickBtn.classList.remove('btn-success');
            activateDepthPickBtn.classList.add('btn-depth');
            depthModeStatus.innerHTML = '⚓ Mode tidak aktif. Klik tombol di atas.';
            depthModeStatus.style.background = '#eef';
            infoPanel.innerHTML = '🌊 Mode titik kedalaman dinonaktifkan.';
        }
        
        function activateDepthPick() {
            if(isDepthPickMode) {
                deactivateDepthPickMode();
                return;
            }
            // Matikan mode gambar pulau dulu
            if(isDrawingMode) resetDrawingMode();
            isDepthPickMode = true;
            map.on('click', depthClickHandler);
            activateDepthPickBtn.innerHTML = '<i class="fas fa-check-circle"></i> Selesai (Klik Peta)';
            activateDepthPickBtn.classList.remove('btn-depth');
            activateDepthPickBtn.classList.add('btn-success');
            depthModeStatus.innerHTML = '🔵 MODE AKTIF: Klik pada peta untuk menandai titik kedalaman!';
            depthModeStatus.style.background = '#d1fae5';
            infoPanel.innerHTML = '🌊 Mode aktif: Klik di peta untuk menandai titik kedalaman laut.';
        }
        
        function depthClickHandler(e) {
            if(isDepthPickMode) {
                addDepthPointFromClick(e.latlng.lat, e.latlng.lng);
            }
        }
